<div class="dialog-backdrop" *ngIf="visible">
  <div class="dialog" role="dialog" aria-labelledby="recovery-key-title">
    <h2 id="recovery-key-title">{{ title }}</h2>
    <p class="dialog-note">
      This 12-word recovery key is the only way to decrypt your crew's encrypted posts and messages.
      It is separate from your login password. Store it in a password manager or write it down and keep it offline.
      We cannot recover it for you.
    </p>

    <div class="phrase-grid" aria-label="Recovery key words">
      <span class="phrase-word" *ngFor="let word of words; let i = index">
        <span class="word-index">{{ i + 1 }}</span>
        {{ word }}
      </span>
    </div>

    <button type="button" class="copy-btn" (click)="copyPhrase()">
      {{ copied ? 'Copied' : 'Copy recovery key' }}
    </button>

    <label class="acknowledge">
      <input type="checkbox" [(ngModel)]="acknowledged" />
      {{ confirmLabel }}
    </label>

    <button type="button" class="confirm-btn" [disabled]="!acknowledged" (click)="onConfirm()">
      Continue
    </button>
  </div>
</div>
