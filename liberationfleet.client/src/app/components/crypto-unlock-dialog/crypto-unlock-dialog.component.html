<div class="dialog-backdrop" *ngIf="visible">
  <div
    class="dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="crypto-unlock-title"
    [appAccessibleDialog]="visible">
    <h2 id="crypto-unlock-title">Unlock encrypted content</h2>
    <p class="dialog-note">
      Enter your 12-word recovery key to decrypt crew posts, proposals, forums, and encrypted gift messages.
      This is separate from your login password.
    </p>

    <label class="field">
      <span>Recovery key</span>
      <textarea
        [(ngModel)]="recoveryPhrase"
        rows="3"
        autocomplete="off"
        spellcheck="false"
        placeholder="twelve words separated by spaces"></textarea>
    </label>

    <label class="remember">
      <input type="checkbox" [(ngModel)]="rememberOnDevice" />
      Remember on this device for this browser session
    </label>

    <button type="button" class="unlock-btn" [disabled]="unlocking" (click)="onUnlock()">
      {{ unlocking ? 'Unlocking...' : 'Unlock' }}
    </button>
  </div>
</div>
