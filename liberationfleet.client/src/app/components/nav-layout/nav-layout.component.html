<div class="nav-layout">
  <div class="nav-content">
    <div class="nav-content-inner">
      <ng-content></ng-content>
      <app-fallible-footer></app-fallible-footer>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a routerLink="/app/crew" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item" #crewNav="routerLinkActive">
      <app-brand-logo class="nav-logo" variant="crew" size="sm" [monochrome]="!crewNav.isActive"></app-brand-logo>
      <span class="nav-label">Crew</span>
    </a>
    <a routerLink="/app/friends" routerLinkActive="active" class="nav-item">
      <i class="fa-solid fa-user-group nav-icon" aria-hidden="true"></i>
      <span class="nav-label">Friends</span>
    </a>
    <a routerLink="/app/notifications" routerLinkActive="active" class="nav-item">
      <span class="nav-icon-wrap">
        <i class="fa-solid fa-bell nav-icon" aria-hidden="true"></i>
        <app-content-badge [count]="unreadCount" [showPlusAtNine]="true"></app-content-badge>
      </span>
      <span class="nav-label">Notifications</span>
    </a>
    <a routerLink="/app/profile" routerLinkActive="active" class="nav-item">
      <i class="fa-solid fa-user nav-icon" aria-hidden="true"></i>
      <span class="nav-label">Profile</span>
    </a>
  </nav>
</div>
