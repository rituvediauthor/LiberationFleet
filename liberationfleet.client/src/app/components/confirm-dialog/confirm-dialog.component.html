<div class="dialog-backdrop" *ngIf="visible" (click)="onBackdropClick($event)">
  <div class="dialog-card" role="alertdialog" aria-modal="true" [attr.aria-label]="title">
    <h2 class="dialog-title">{{ title }}</h2>
    <p class="dialog-message">{{ message }}</p>
    <button type="button" class="dialog-button" (click)="onConfirm()">{{ confirmLabel }}</button>
  </div>
</div>
