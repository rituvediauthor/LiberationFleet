<div class="page-layout">
  <div class="page-content" [class.page-content-fill]="fillHeight">
    <div class="page-content-inner" [class.page-content-inner-fill]="fillHeight">
      <ng-content></ng-content>
      <app-fallible-footer *ngIf="showFallibleFooter"></app-fallible-footer>
    </div>
  </div>

  <div class="action-bar" role="toolbar" aria-label="Page actions">
    <button
      *ngIf="backButton"
      class="action-button back-button"
      (click)="backButton.onClick && backButton.onClick()"
      [disabled]="backButton.disabled"
      type="button"
      aria-label="Go back">
      <i class="fa-solid fa-angle-left" aria-hidden="true"></i>
    </button>

    <button
      *ngIf="brandNavButton && !backButton"
      class="action-button brand-nav-button"
      type="button"
      aria-label="LiberationFleet home"
      (click)="onBrandNavClick()">
      <app-brand-logo variant="lf" size="sm" alt=""></app-brand-logo>
    </button>

    <button
      *ngIf="showCrewFallback"
      class="action-button crew-fallback-button"
      type="button"
      aria-label="Go to crew home"
      (click)="goToCrewHome()">
      <app-brand-logo variant="crew" size="sm" alt=""></app-brand-logo>
    </button>

    <ng-content select="[actionBar]"></ng-content>

    <button
      *ngIf="primaryButton"
      class="action-button primary-button"
      [class.has-secondary]="secondaryButton"
      (click)="primaryButton.onClick && primaryButton.onClick()"
      [disabled]="primaryButton.disabled"
      type="button">
      {{ primaryButton.label }}
    </button>

    <button
      *ngIf="secondaryButton"
      class="action-button secondary-button"
      (click)="secondaryButton.onClick && secondaryButton.onClick()"
      [disabled]="secondaryButton.disabled"
      type="button">
      {{ secondaryButton.label }}
    </button>
  </div>
</div>
