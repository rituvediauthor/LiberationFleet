<div class="attachment-picker">
  <div class="attachment-actions" *ngIf="canAddMore">
    <label
      class="attach-btn attach-icon-btn"
      aria-label="Attach file"
      title="Attach file"
      (mousedown)="$event.preventDefault()">
      <i class="fa-solid fa-paperclip" aria-hidden="true"></i>
      <input
        type="file"
        [attr.accept]="resolvedAcceptTypes"
        [multiple]="maxAttachments !== 1"
        hidden
        (click)="onFileInputClick()"
        (change)="onFileSelected($event)"
        (cancel)="onFileInputCancel()" />
    </label>
    <button
      type="button"
      class="attach-btn attach-icon-btn"
      *ngIf="canRecordAudio && !audioRecorder.isRecording"
      aria-label="Record audio"
      title="Record audio"
      (mousedown)="$event.preventDefault()"
      (click)="startRecording()">
      <i class="fa-solid fa-microphone" aria-hidden="true"></i>
    </button>
  </div>

  <div class="recording-panel" *ngIf="canRecordAudio && audioRecorder.isRecording">
    <span class="recording-indicator" role="status">Recording {{ audioRecorder.formatElapsed() }} / 3:00</span>
    <button type="button" class="attach-btn stop-btn" (mousedown)="$event.preventDefault()" (click)="stopRecording()">Stop</button>
    <button type="button" class="attach-btn cancel-btn" (mousedown)="$event.preventDefault()" (click)="cancelRecording()">Cancel</button>
  </div>

  <ul class="attachment-list" *ngIf="attachments.length > 0">
    <li *ngFor="let attachment of attachments; let i = index">
      <img
        *ngIf="attachment.type === 'image' && attachment.previewUrl"
        class="attachment-preview"
        [src]="attachment.previewUrl"
        alt="">
      <span>{{ attachmentLabel(attachment) }}</span>
      <button
        type="button"
        class="remove-btn"
        [attr.aria-label]="'Remove ' + attachmentLabel(attachment)"
        (mousedown)="$event.preventDefault()"
        (click)="removeAttachment(i)">Remove</button>
    </li>
  </ul>
</div>
