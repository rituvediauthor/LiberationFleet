<div class="carousel" [class.inline]="variant === 'inline'" *ngIf="images.length > 0">
  <div class="carousel-viewport">
    <button
      type="button"
      class="carousel-slide"
      (click)="openFull(activeIndex)"
      [attr.aria-label]="'View image ' + (activeIndex + 1) + ' of ' + images.length">
      <img [src]="images[activeIndex]" [alt]="title + ' image ' + (activeIndex + 1)" />
    </button>

    <button
      type="button"
      class="carousel-nav prev"
      *ngIf="images.length > 1"
      (click)="showPrevious($event)"
      aria-label="Previous image">
      <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
    </button>

    <button
      type="button"
      class="carousel-nav next"
      *ngIf="images.length > 1"
      (click)="showNext($event)"
      aria-label="Next image">
      <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
    </button>

    <span class="carousel-counter" *ngIf="images.length > 1">
      {{ activeIndex + 1 }} / {{ images.length }}
    </span>
  </div>
</div>

<div class="lightbox" *ngIf="selectedIndex !== null" (click)="closeFull()">
  <div class="lightbox-content" (click)="$event.stopPropagation()">
    <button type="button" class="lightbox-close" (click)="closeFull()" aria-label="Close image">×</button>
    <button
      type="button"
      class="lightbox-nav prev"
      *ngIf="images.length > 1"
      (click)="showPreviousInLightbox($event)"
      aria-label="Previous image">
      ‹
    </button>
    <img
      class="lightbox-image"
      [src]="images[selectedIndex]"
      [alt]="title" />
    <button
      type="button"
      class="lightbox-nav next"
      *ngIf="images.length > 1"
      (click)="showNextInLightbox($event)"
      aria-label="Next image">
      ›
    </button>
  </div>
</div>
