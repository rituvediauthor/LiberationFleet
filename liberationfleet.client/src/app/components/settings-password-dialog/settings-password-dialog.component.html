<div class="dialog-backdrop" *ngIf="visible" (click)="onBackdropClick($event)">
  <div class="dialog" role="dialog" aria-modal="true" aria-label="Settings password">
    <h2>Settings password required</h2>
    <p class="dialog-note">Enter your settings lock password to save changes.</p>

    <label class="password-field">
      <span>Settings password</span>
      <input
        type="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        (keyup.enter)="onConfirm()">
    </label>

    <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>

    <button type="button" class="unlock-btn" [disabled]="!password.trim() || verifying" (click)="onConfirm()">
      {{ verifying ? 'Verifying...' : 'Continue' }}
    </button>
  </div>
</div>
