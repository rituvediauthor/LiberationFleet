<app-page-layout [backButton]="backButton" [primaryButton]="sendButton">
  <div class="forgot-password-container">
    <div class="form-card">
      <h1>Forgot Password?</h1>
      <p class="subtitle" id="forgot-password-help">Enter your email address and we'll send you a link to reset your password.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate aria-describedby="forgot-password-help">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-input"
            autocomplete="email"
            placeholder="Enter your email address"
            [attr.aria-invalid]="isInvalid('email')"
            [attr.aria-describedby]="isInvalid('email') ? 'email-error' : null">
          <span id="email-error" class="error-text" role="alert" *ngIf="isInvalid('email') && form.get('email')?.hasError('required')">
            Email is required
          </span>
          <span class="error-text" role="alert" *ngIf="isInvalid('email') && form.get('email')?.hasError('email')">
            Please enter a valid email
          </span>
        </div>
      </form>
    </div>
  </div>
</app-page-layout>
