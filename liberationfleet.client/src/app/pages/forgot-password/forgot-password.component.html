<app-page-layout [backButton]="backButton" [primaryButton]="sendButton">
  <div class="forgot-password-container">
    <div class="form-card">
      <h1>Forgot Password?</h1>
      <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-input"
            placeholder="Enter your email address">
          <span class="error-text" *ngIf="form.get('email')?.hasError('required') && form.get('email')?.touched">
            Email is required
          </span>
          <span class="error-text" *ngIf="form.get('email')?.hasError('email') && form.get('email')?.touched">
            Please enter a valid email
          </span>
        </div>
      </form>
    </div>
  </div>
</app-page-layout>
