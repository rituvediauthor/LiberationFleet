<app-page-layout [backButton]="backButton" [primaryButton]="saveButton">
  <div class="content-settings-page">
    <h1 id="content-settings-heading">Content</h1>
    <p class="intro">Choose how 18+ chats and forums are shown.</p>

    <p *ngIf="loading" class="state-text">Loading preferences...</p>
    <p *ngIf="!loading && errorMessage" class="state-text error">{{ errorMessage }}</p>

    <div
      class="preference-list"
      role="radiogroup"
      aria-labelledby="content-settings-heading"
      *ngIf="!loading">
      <label class="preference-row" *ngFor="let option of options">
        <input
          type="radio"
          name="adultContentPreference"
          [value]="option.value"
          [checked]="selectedPreference === option.value"
          (change)="onPreferenceChange(option.value)">
        <span class="preference-copy">
          <span class="preference-label">{{ option.label }}</span>
          <span class="preference-description">{{ option.description }}</span>
        </span>
      </label>
    </div>
  </div>
</app-page-layout>

<app-settings-password-dialog
  [visible]="showPasswordDialog"
  [errorMessage]="passwordDialogError"
  [verifying]="passwordDialogVerifying"
  (confirmed)="onPasswordDialogConfirmed($event)"
  (dismissed)="onPasswordDialogDismissed()">
</app-settings-password-dialog>
