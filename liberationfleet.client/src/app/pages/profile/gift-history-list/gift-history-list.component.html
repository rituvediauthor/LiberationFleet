<app-page-layout [backButton]="backButton">
  <div class="gift-history-page">
    <h1 class="page-title">Gift History</h1>
    <p class="page-subtitle">Everyone you have given gifts to</p>

    <p *ngIf="loading" class="state-text">Loading gift history...</p>
    <p *ngIf="!loading && errorMessage" class="state-text error">{{ errorMessage }}</p>
    <p *ngIf="!loading && !errorMessage && recipients.length === 0" class="state-text">You have not given any gifts yet.</p>

    <div class="recipient-list" *ngIf="!loading && recipients.length > 0">
      <button
        type="button"
        class="recipient-row"
        *ngFor="let recipient of recipients"
        (click)="openRecipient(recipient)">
        <div class="recipient-main">
          <p class="recipient-name">{{ recipient.recipientUsername }}</p>
          <p class="recipient-total">Total given: ${{ recipient.totalAmount }}</p>
        </div>
        <i class="fa-solid fa-angle-right chevron" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</app-page-layout>
