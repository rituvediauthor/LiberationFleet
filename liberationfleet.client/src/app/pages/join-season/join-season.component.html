<app-page-layout [backButton]="backButton" [primaryButton]="readyButton">
  <div class="join-season-page">
    <div class="log-section" #logContainer>
      <h2>Gift activity</h2>
      <div class="log-entry" *ngFor="let entry of entries">
        <p class="log-message">{{ entry.message }}</p>
        <time class="log-time">{{ formatTimestamp(entry.timestamp) }}</time>
      </div>
    </div>

    <div class="form-card" *ngIf="!loading">
      <h1>Join Season</h1>
      <p class="intro-text">
        In order to join the mutual aid system you need to fill out this form and click "Ready".
      </p>

      <form [formGroup]="form">
        <section class="section">
          <h2>Payment Platforms</h2>
          <div class="platform-row" *ngFor="let account of paymentPlatforms">
            <select [(ngModel)]="account.platformId" [ngModelOptions]="{standalone: true}" class="form-input" (ngModelChange)="onPaymentPlatformChange()">
              <option *ngFor="let p of platformOptions" [ngValue]="p.id">{{ p.name }}</option>
            </select>
            <input
              [(ngModel)]="account.handle"
              [ngModelOptions]="{standalone: true}"
              class="form-input"
              placeholder="Username or tag"
              (ngModelChange)="onPaymentPlatformChange()">
            <button type="button" class="icon-btn" (click)="removePaymentPlatform(account.id)">×</button>
          </div>
          <button type="button" class="text-btn" (click)="addPaymentPlatform()">+ Add platform</button>
        </section>

        <div class="form-group">
          <label for="estimate">Estimated monthly contribution ($)</label>
          <input id="estimate" type="number" formControlName="estimatedMonthlyContribution" class="form-input" min="0.01" step="0.01">
        </div>
      </form>
    </div>
  </div>
</app-page-layout>
