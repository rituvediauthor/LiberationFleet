<app-page-layout [showFallibleFooter]="false" [backButton]="backButton" [primaryButton]="saveButton">
  <div class="rule-form-page">
    <h1 class="page-title">Edit Rule</h1>

    <p class="state-text" *ngIf="loading">Loading rule...</p>
    <p class="state-text error" *ngIf="!loading && loadError">{{ loadError }}</p>

    <form [formGroup]="form" *ngIf="!loading && !loadError">
      <div class="form-group">
        <label for="title">Title</label>
        <input
          id="title"
          class="form-input"
          type="text"
          formControlName="title"
          placeholder="Rule title"
          [attr.aria-invalid]="isInvalid('title')"
          [attr.aria-describedby]="isInvalid('title') ? 'title-error' : null" />
        <span id="title-error" class="error-text" role="alert" *ngIf="isInvalid('title')">
          Title is required
        </span>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          class="form-input textarea"
          rows="8"
          formControlName="description"
          placeholder="Describe the rule"
          [attr.aria-invalid]="isInvalid('description')"
          [attr.aria-describedby]="isInvalid('description') ? 'description-error' : null"></textarea>
        <span id="description-error" class="error-text" role="alert" *ngIf="isInvalid('description')">
          Description is required
        </span>
      </div>

      <div class="form-group public-option">
        <label class="checkbox-option">
          <input type="checkbox" formControlName="isPublic" />
          Public
        </label>
        <p class="hint-text">
          This rule will not be encrypted if public. Users looking to join this crew will see this rule and have to agree to it before they can request to join.
        </p>
      </div>

      <div class="delete-section">
        <button
          type="button"
          class="delete-btn"
          [disabled]="isDeleting || isSubmitting"
          (click)="deleteRule()">
          Delete rule
        </button>
      </div>
    </form>
  </div>
</app-page-layout>
