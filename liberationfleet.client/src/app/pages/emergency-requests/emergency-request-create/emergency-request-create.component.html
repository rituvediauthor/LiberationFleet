<app-page-layout [backButton]="backButton" [primaryButton]="submitButton">
  <div class="form-container">
    <div class="form-card">
      <h1>Create Emergency Request</h1>
      <p class="hint">Describe why you need urgent aid and how much is required.</p>

      <form [formGroup]="form">
        <div class="form-group">
          <label for="purpose">Purpose</label>
          <textarea
            id="purpose"
            formControlName="purpose"
            class="form-input"
            rows="4"
            maxlength="2000"
            [attr.aria-invalid]="isInvalid('purpose')"
            [attr.aria-describedby]="isInvalid('purpose') ? 'purpose-error' : null"></textarea>
          <span id="purpose-error" class="error-text" role="alert" *ngIf="isInvalid('purpose')">
            Purpose is required
          </span>
        </div>

        <div class="form-group">
          <label for="amountNeeded">Amount needed ($)</label>
          <input
            id="amountNeeded"
            type="number"
            formControlName="amountNeeded"
            class="form-input"
            min="0.01"
            step="0.01"
            [attr.aria-invalid]="isInvalid('amountNeeded')"
            [attr.aria-describedby]="isInvalid('amountNeeded') ? 'amountNeeded-error' : null">
          <span id="amountNeeded-error" class="error-text" role="alert" *ngIf="isInvalid('amountNeeded')">
            Enter an amount of at least $0.01
          </span>
        </div>
      </form>
    </div>
  </div>
</app-page-layout>
