<app-page-layout [backButton]="backButton" [primaryButton]="submitButton">
  <div class="form-container">
    <div class="form-card">
      <h1>Create Emergency Request</h1>
      <p class="hint">Describe why you need urgent aid and how much is required.</p>

      <form [formGroup]="form">
        <div class="form-group">
          <label for="purpose">Purpose</label>
          <textarea id="purpose" formControlName="purpose" class="form-input" rows="4" maxlength="2000"></textarea>
        </div>

        <div class="form-group">
          <label for="amountNeeded">Amount needed ($)</label>
          <input id="amountNeeded" type="number" formControlName="amountNeeded" class="form-input" min="0.01" step="0.01">
        </div>
      </form>
    </div>
  </div>
</app-page-layout>
