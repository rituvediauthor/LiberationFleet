<div class="gift-log-page">
  <div class="log-scroll" #logContainer>
    <div class="scroll-page-body log-channel-body">
      <h1 class="page-title">Gift Log</h1>
      <p *ngIf="loading" class="state-text">Loading gift log…</p>
      <p *ngIf="errorMessage" class="state-text error">{{ errorMessage }}</p>
      <p *ngIf="loadingMore" class="state-text">Loading older gifts…</p>

      <p *ngIf="!loading && !errorMessage && entries.length === 0" class="state-text">
        {{ userInSeason ? 'No gifts recorded yet.' : 'Join the season to record gifts. You can still view the gift log if available.' }}
      </p>

      <div class="log-list" *ngIf="!loading && !errorMessage && entries.length > 0">
        <article
          *ngFor="let entry of entries; let i = index"
          class="log-entry"
          [class.highlighted]="isHighlighted(entry)"
          [class.flagged-not-complete]="entry.displayFlag === 'notComplete'"
          [class.flagged-cant-complete]="entry.displayFlag === 'cantComplete'">
          <div
            *ngIf="hasMore && i === loadMoreTriggerIndex"
            #loadMoreSentinel
            class="load-more-sentinel"
            aria-hidden="true"></div>
          <p class="log-message">{{ entry.message }}</p>
          <time class="log-time">{{ formatTimestamp(entry.timestamp) }}</time>

          <div *ngIf="entry.availableActions?.length" class="verification-row">
            <button
              *ngIf="hasAction(entry, 'confirmReceived')"
              type="button"
              class="verify-btn received-btn"
              [disabled]="verifyingGiftId === entry.id"
              (click)="verifyGift(entry, 'confirmReceived')">
              Received
            </button>
            <button
              *ngIf="hasAction(entry, 'confirmNotReceived')"
              type="button"
              class="verify-btn not-received-btn"
              [disabled]="verifyingGiftId === entry.id"
              (click)="verifyGift(entry, 'confirmNotReceived')">
              Not Received
            </button>
            <button
              *ngIf="hasAction(entry, 'cantComplete')"
              type="button"
              class="verify-btn cant-complete-btn"
              [disabled]="verifyingGiftId === entry.id"
              (click)="verifyGift(entry, 'cantComplete')">
              Can't Complete
            </button>

            <div *ngIf="hasAction(entry, 'completeTransfer')" class="complete-transfer-row">
              <select
                class="platform-select"
                [(ngModel)]="completionPlatformSelections[entry.id]">
                <option [ngValue]="''">Select payment platform</option>
                <option
                  *ngFor="let option of entry.completionPlatformOptions"
                  [ngValue]="option.id">
                  {{ option.name }}
                </option>
              </select>
              <button
                type="button"
                class="verify-btn complete-btn"
                [disabled]="verifyingGiftId === entry.id || !canCompleteTransfer(entry)"
                (click)="verifyGift(entry, 'completeTransfer')">
                Complete
              </button>
            </div>
          </div>
        </article>
      </div>

      <button
        type="button"
        class="export-btn"
        *ngIf="!loading && !errorMessage && canExportCrewData"
        (click)="exportGiftLog()">
        Download gift log
      </button>

      <app-fallible-footer></app-fallible-footer>
    </div>
  </div>

  <div class="gift-action-bar">
    <button type="button" class="back-btn" (click)="goBack()" aria-label="Go back">
      <i class="fa-solid fa-angle-left" aria-hidden="true"></i>
    </button>
    <button *ngIf="seasonStarted && userInSeason" type="button" class="record-btn" (click)="goToRecordGift()">Record Gift</button>
    <button *ngIf="seasonStarted && !userInSeason" type="button" class="record-btn" (click)="goToJoinSeason()">Join season</button>
  </div>
</div>
