<app-page-layout [backButton]="backButton" [primaryButton]="saveButton">
  <div class="chat-create-page">
    <h1>Edit chat room</h1>

    <p class="state-text" *ngIf="loading">Loading chat room...</p>
    <p class="state-text error" *ngIf="!loading && loadError">{{ loadError }}</p>

    <form [formGroup]="form" *ngIf="!loading && !loadError">
      <label class="field">
        <span>Type</span>
        <select formControlName="roomType">
          <option *ngFor="let type of roomTypes" [value]="type.value">{{ type.label }}</option>
        </select>
      </label>

      <label class="field">
        <span>Name</span>
        <input
          id="name"
          type="text"
          formControlName="name"
          maxlength="120"
          [attr.aria-invalid]="isInvalid('name')"
          [attr.aria-describedby]="isInvalid('name') ? 'name-error' : null" />
      </label>
      <span id="name-error" class="error-text" role="alert" *ngIf="isInvalid('name')">
        Name is required
      </span>

      <label class="field">
        <span>Purpose</span>
        <textarea
          id="purpose"
          formControlName="purpose"
          rows="4"
          maxlength="2000"
          [attr.aria-invalid]="isInvalid('purpose')"
          [attr.aria-describedby]="isInvalid('purpose') ? 'purpose-error' : null"></textarea>
      </label>
      <span id="purpose-error" class="error-text" role="alert" *ngIf="isInvalid('purpose')">
        Purpose is required
      </span>

      <div class="delete-section">
        <button
          type="button"
          class="delete-btn"
          [disabled]="isDeleting || isSubmitting"
          (click)="deleteRoom()">
          Delete chat
        </button>
      </div>
    </form>
  </div>
</app-page-layout>
