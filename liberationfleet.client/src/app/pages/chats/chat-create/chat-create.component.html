<app-page-layout [backButton]="backButton" [primaryButton]="createButton">
  <div class="chat-create-page">
    <h1>Create chat room</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label class="field">
        <span>Type</span>
        <select formControlName="roomType">
          <option *ngFor="let type of availableRoomTypes" [value]="type.value">{{ type.label }}</option>
        </select>
      </label>

      <label class="field">
        <span>Name</span>
        <input
          id="name"
          type="text"
          formControlName="name"
          maxlength="120"
          placeholder="General, Planning, Hangout..."
          [attr.aria-invalid]="isInvalid('name')"
          [attr.aria-describedby]="isInvalid('name') ? 'name-error' : null" />
      </label>
      <span id="name-error" class="error-text" role="alert" *ngIf="isInvalid('name')">
        Name is required
      </span>

      <label class="field">
        <span>Purpose</span>
        <textarea
          id="purpose"
          formControlName="purpose"
          rows="4"
          maxlength="2000"
          placeholder="Describe what this channel is for"
          [attr.aria-invalid]="isInvalid('purpose')"
          [attr.aria-describedby]="isInvalid('purpose') ? 'purpose-error' : null"></textarea>
      </label>
      <span id="purpose-error" class="error-text" role="alert" *ngIf="isInvalid('purpose')">
        Purpose is required
      </span>

      <label class="checkbox-field">
        <input type="checkbox" formControlName="isAdultContent" />
        <span>18+ — contains adult or graphic content</span>
      </label>
    </form>
  </div>
</app-page-layout>
