<app-page-layout [backButton]="backButton" [primaryButton]="createButton">
  <div class="chat-create-page">
    <h1>Create chat room</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label class="field">
        <span>Type</span>
        <select formControlName="roomType">
          <option *ngFor="let type of roomTypes" [value]="type.value">{{ type.label }}</option>
        </select>
      </label>

      <label class="field">
        <span>Name</span>
        <input type="text" formControlName="name" maxlength="120" placeholder="General, Planning, Hangout..." />
      </label>
      <span class="error-text" *ngIf="form.get('name')?.touched && form.get('name')?.hasError('required')">
        Name is required
      </span>

      <label class="field">
        <span>Purpose</span>
        <textarea
          formControlName="purpose"
          rows="4"
          maxlength="2000"
          placeholder="Describe what this channel is for"></textarea>
      </label>
      <span class="error-text" *ngIf="form.get('purpose')?.touched && form.get('purpose')?.hasError('required')">
        Purpose is required
      </span>

      <label class="checkbox-field">
        <input type="checkbox" formControlName="isAdultContent" />
        <span>18+ — contains adult or graphic content</span>
      </label>
    </form>
  </div>
</app-page-layout>
