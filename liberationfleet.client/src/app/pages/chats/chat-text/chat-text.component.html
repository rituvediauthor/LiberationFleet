<div class="chat-text-page">
  <div class="message-scroll" #messageScroll>
    <div class="scroll-page-body chat-channel-body">
    <h1 class="room-title">{{ roomName }}</h1>
    <button
      type="button"
      class="anonymous-toggle"
      *ngIf="canToggleAnonymousMode"
      (click)="toggleAnonymousMode()">
      {{ anonymousModeEnabled ? 'Disable anonymous mode' : 'Enable anonymous mode' }}
    </button>

    <p class="state-text" *ngIf="loading">Loading messages...</p>
    <p class="state-text error" *ngIf="!loading && loadError">{{ loadError }}</p>
    <p class="state-text" *ngIf="loadingOlder">Loading older messages...</p>

    <div class="message-list" *ngIf="contentRevealed && !loading && !loadError">
      <article
        #messageItem
        class="message-bubble"
        *ngFor="let message of messages"
        [class.own]="isOwnMessage(message)"
        [class.media-primary]="!message.body && (message.resolvedAttachments?.length ?? 0) > 0">
        <div class="message-header">
          <p class="message-meta">
            <strong>{{ displayAuthor(message) }}</strong>
            <span>·</span>
            <span>{{ message.createdAt | date:'short' }}</span>
          </p>
          <div class="message-actions">
            <button
              type="button"
              class="kebab-btn"
              aria-label="Message options"
              [attr.aria-expanded]="openMessageMenuId === message.id"
              aria-haspopup="menu"
              (click)="toggleMessageMenu(message.id, $event)">
              <i class="fa-solid fa-ellipsis-vertical" aria-hidden="true"></i>
            </button>
            <div
              class="message-menu"
              role="menu"
              *ngIf="openMessageMenuId === message.id"
              (click)="$event.stopPropagation()"
              (keydown.escape)="closeMenus()">
              <button type="button" role="menuitem" *ngIf="isOwnMessage(message)" (click)="startEditMessage(message, $event)">Edit</button>
              <button type="button" role="menuitem" *ngIf="!isOwnMessage(message)" (click)="openReportMessage(message, $event)">Report</button>
            </div>
          </div>
        </div>
        <p class="message-body" *ngIf="message.body"><app-mention-text [text]="message.body" /></p>
        <app-proposal-attachment-display
          [attachments]="message.resolvedAttachments ?? []"
          [compact]="true"
          [canDelete]="canModerateAttachments"
          [crewId]="crewId"
          (attachmentDeleted)="onAttachmentDeleted($event, message)">
        </app-proposal-attachment-display>
      </article>
    </div>
    <app-fallible-footer></app-fallible-footer>
    </div>
  </div>

  <div class="chat-action-bar" *ngIf="contentRevealed">
    <div class="chat-action-bar-inner">
    <button type="button" class="back-btn" (click)="goBack()" aria-label="Go back">
      <i class="fa-solid fa-angle-left" aria-hidden="true"></i>
    </button>

    <div class="composer" [class.expanded]="composerExpanded">
      <textarea
        class="message-input"
        [class.expanded]="composerExpanded"
        [(ngModel)]="messageText"
        appMentionAutocomplete
        [(mentionedUserIds)]="mentionedUserIds"
        (focus)="onComposerFocus()"
        (blur)="onComposerBlur()"
        [placeholder]="editingMessageId ? 'Edit message...' : 'Message...'"
        [attr.aria-label]="editingMessageId ? 'Edit message' : 'Message'"
        rows="1"></textarea>

      <div class="kept-attachments" *ngIf="keptEditAttachments.length > 0">
        <div class="kept-attachment" *ngFor="let attachment of keptEditAttachments; let i = index">
          <span>{{ attachment.fileName || attachment.resourceId }}</span>
          <button type="button" class="link-btn" (click)="removeKeptAttachment(i)">Remove</button>
        </div>
      </div>

      <app-proposal-attachment-picker
        class="message-attachment-picker"
        *ngIf="canAttachFiles"
        [class.collapsed]="!composerExpanded"
        [attachments]="messageAttachments"
        (fileDialogOpenChange)="onFileDialogOpenChange($event)">
      </app-proposal-attachment-picker>
    </div>

    <button
      type="button"
      class="cancel-btn"
      *ngIf="editingMessageId"
      [disabled]="sending"
      (click)="cancelEditMessage()">
      Cancel
    </button>

    <button
      type="button"
      class="send-btn"
      *ngIf="composerExpanded"
      [disabled]="sending || !canSend()"
      (click)="sendMessage()">
      {{ editingMessageId ? 'Save' : 'Send' }}
    </button>
    </div>
  </div>
</div>

<app-adult-content-gate
  [visible]="showAdultGate"
  (confirmed)="onAdultGateConfirmed()"
  (declined)="onAdultGateDeclined()">
</app-adult-content-gate>

<app-report-content-dialog
  [visible]="showReportDialog"
  targetType="ChatMessage"
  [targetResourceId]="reportTarget?.id ?? null"
  [targetParentId]="roomId"
  [targetAuthorUserId]="reportTarget?.authorUserId ?? null"
  [crewId]="fleetId > 0 ? null : crewId"
  [fleetId]="fleetId > 0 ? fleetId : null"
  [evidenceText]="reportTarget?.body || ''"
  [evidenceAuthorUsername]="reportTarget ? displayAuthor(reportTarget) : ''"
  [evidenceMediaResourceIds]="reportMediaIds"
  (dismissed)="onReportDismissed()"
  (submitted)="onReportSubmitted()">
</app-report-content-dialog>
