<app-page-layout [backButton]="backButton" [primaryButton]="recordButton">
  <div class="form-container">
    <div class="form-card">
      <h1>Record Gift</h1>
      <p *ngIf="loading" class="status-text">Loading reception order…</p>

      <form [formGroup]="form" *ngIf="!loading">
        <div class="gift-entry custom-entry">
          <h2>Custom gift</h2>
          <p class="entry-hint">Give to any crewmate outside the current reception order.</p>
          <div class="entry-grid">
            <div class="form-group">
              <label>Recipient</label>
              <select formControlName="customRecipientId" class="form-input">
                <option value="">Select crew member</option>
                <option *ngFor="let member of crewMembers" [value]="member.id">{{ member.username }}</option>
              </select>
            </div>
            <div class="form-group">
              <label>Amount ($)</label>
              <input type="number" formControlName="customAmount" class="form-input" min="0.01" step="0.01">
            </div>
            <div class="form-group">
              <label>Platform</label>
              <select formControlName="customPaymentPlatformId" class="form-input">
                <option value="">Select platform</option>
                <option *ngFor="let p of platforms" [ngValue]="p.id">{{ p.name }}</option>
              </select>
            </div>
          </div>
        </div>

        <div
          class="gift-entry"
          *ngFor="let entry of receptionEntries; let i = index"
          [formGroup]="$any(entries.at(i))">
          <div class="entry-header">
            <span class="entry-name">{{ entry.username }}</span>
            <span class="entry-need">needs ${{ entry.amountNeeded }}</span>
            <span class="entry-type">{{ entryTypeLabel(entry) }}</span>
          </div>

          <div class="entry-grid">
            <div class="form-group">
              <label>Gift amount ($)</label>
              <input type="number" formControlName="amount" class="form-input" min="0.01" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
              <label>Platform</label>
              <select formControlName="paymentPlatformId" class="form-input">
                <option *ngFor="let p of platforms" [ngValue]="p.id">{{ p.name }}</option>
              </select>
            </div>
            <div class="form-group" *ngIf="needsMiddlemanSelector(entry)">
              <label>Middle man</label>
              <select formControlName="middlemanId" class="form-input">
                <option value="">Select middle man</option>
                <option *ngFor="let mm of entry.middlemanOptions" [value]="mm.userId">{{ mm.username }}</option>
              </select>
            </div>
          </div>

          <p class="middleman-note" *ngIf="entry.noSuitableMiddleman">no suitable middle-man</p>
        </div>
      </form>
    </div>
  </div>
</app-page-layout>

<app-confirm-dialog
  [visible]="showConfirmDialog"
  title="Alert"
  message="This only records gifts that were already given by means outside of this app."
  confirmLabel="Okay"
  (confirmed)="onConfirmRecord()"
  (dismissed)="onDismissDialog()">
</app-confirm-dialog>
