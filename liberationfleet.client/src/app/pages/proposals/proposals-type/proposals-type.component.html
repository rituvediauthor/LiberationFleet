<app-page-layout [backButton]="backButton" [primaryButton]="createButton">
  <div class="proposals-type-page">
    <h1 class="page-title">Proposals</h1>
    <p class="page-subtitle">Browse proposals by status</p>

    <nav class="status-menu" aria-label="Proposal status">
      <button type="button" class="menu-link" (click)="openStatus('Approved')">
        <span class="menu-icon-wrap">
          <i class="fa-solid fa-circle-check menu-icon" aria-hidden="true"></i>
          <app-content-badge [count]="statusBadgeCount('approved')"></app-content-badge>
        </span>
        <span class="menu-label">Approved</span>
        <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>
      </button>

      <button type="button" class="menu-link" (click)="openStatus('Pending')">
        <span class="menu-icon-wrap">
          <i class="fa-solid fa-clock menu-icon" aria-hidden="true"></i>
          <app-content-badge [count]="statusBadgeCount('pending')"></app-content-badge>
        </span>
        <span class="menu-label">Pending</span>
        <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>
      </button>

      <button type="button" class="menu-link" (click)="openStatus('Rejected')">
        <span class="menu-icon-wrap">
          <i class="fa-solid fa-circle-xmark menu-icon" aria-hidden="true"></i>
          <app-content-badge [count]="statusBadgeCount('rejected')"></app-content-badge>
        </span>
        <span class="menu-label">Rejected</span>
        <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>
      </button>
    </nav>
  </div>
</app-page-layout>
