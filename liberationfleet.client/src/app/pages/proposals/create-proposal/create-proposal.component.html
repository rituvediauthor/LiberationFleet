<app-page-layout [backButton]="backButton" [primaryButton]="createButton">
  <div class="create-proposal-page">
    <h1 class="page-title">Create Proposal</h1>

    <form [formGroup]="form">
      <div class="form-group">
        <label for="title">Title</label>
        <input id="title" class="form-input" type="text" formControlName="title" placeholder="Proposal title" />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          class="form-input textarea"
          rows="8"
          formControlName="description"
          placeholder="Describe your proposal"></textarea>
      </div>

      <app-proposal-attachment-picker [attachments]="attachments"></app-proposal-attachment-picker>
    </form>
  </div>
</app-page-layout>
