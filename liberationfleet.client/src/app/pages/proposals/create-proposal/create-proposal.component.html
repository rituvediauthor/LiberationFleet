<app-page-layout [backButton]="backButton" [primaryButton]="createButton">
  <div class="create-proposal-page">
    <h1 class="page-title">Create Proposal</h1>

    <p class="permission-notice" *ngIf="!canCreateProposals">
      {{ permissionNotice }}
    </p>

    <form [formGroup]="form">
      <div class="form-group">
        <label for="title">Title</label>
        <input
          id="title"
          class="form-input"
          type="text"
          formControlName="title"
          placeholder="Proposal title"
          [attr.aria-invalid]="isInvalid('title')"
          [attr.aria-describedby]="isInvalid('title') ? 'title-error' : null" />
        <span id="title-error" class="error-text" role="alert" *ngIf="isInvalid('title')">
          Title is required
        </span>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          class="form-input textarea"
          rows="8"
          formControlName="description"
          appMentionAutocomplete
          [(mentionedUserIds)]="mentionedUserIds"
          placeholder="Describe your proposal"
          [attr.aria-invalid]="isInvalid('description')"
          [attr.aria-describedby]="isInvalid('description') ? 'description-error' : null"></textarea>
        <span id="description-error" class="error-text" role="alert" *ngIf="isInvalid('description')">
          Description is required
        </span>
      </div>

      <app-proposal-attachment-picker *ngIf="canAttachFiles" [attachments]="attachments"></app-proposal-attachment-picker>
    </form>
  </div>
</app-page-layout>
