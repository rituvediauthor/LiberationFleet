<app-page-layout [backButton]="backButton" [primaryButton]="saveButton">
  <div class="password-update-page">
    <h1>Password update</h1>
    <p class="intro">Change your account password.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label class="field">
        <span>Current password</span>
        <input type="password" formControlName="currentPassword" autocomplete="current-password">
      </label>

      <label class="field">
        <span>New password</span>
        <input type="password" formControlName="newPassword" autocomplete="new-password">
      </label>

      <label class="field">
        <span>Confirm new password</span>
        <input type="password" formControlName="confirmPassword" autocomplete="new-password">
      </label>

      <ul class="requirements">
        <li [class.met]="hasPasswordRequirement('length')">At least 8 characters</li>
        <li [class.met]="hasPasswordRequirement('uppercase')">One uppercase letter</li>
        <li [class.met]="hasPasswordRequirement('lowercase')">One lowercase letter</li>
        <li [class.met]="hasPasswordRequirement('number')">One number</li>
        <li [class.met]="hasPasswordRequirement('special')">One special character</li>
      </ul>

      <p *ngIf="form.hasError('passwordMismatch') && form.get('confirmPassword')?.touched" class="error-text">
        Passwords do not match.
      </p>
    </form>
  </div>
</app-page-layout>
