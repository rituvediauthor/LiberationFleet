<app-page-layout [backButton]="backButton" [primaryButton]="createButton">
  <div class="create-offering-page">
    <h1 class="page-title">Create Offering</h1>

    <form [formGroup]="form">
      <div class="form-group">
        <span class="group-label">Offering type</span>
        <div class="radio-group" role="radiogroup" aria-label="Offering type">
          <label class="radio-option">
            <input type="radio" formControlName="offeringKind" value="Durable" />
            <span>Durable goods</span>
          </label>
          <label class="radio-option">
            <input type="radio" formControlName="offeringKind" value="Consumable" />
            <span>Consumable goods</span>
          </label>
          <label class="radio-option">
            <input type="radio" formControlName="offeringKind" value="Service" />
            <span>Service</span>
          </label>
        </div>
      </div>

      <div class="form-group" *ngIf="showFulfillmentMode">
        <span class="group-label">Fulfillment</span>
        <div class="radio-group" role="radiogroup" aria-label="Fulfillment mode">
          <label class="radio-option">
            <input type="radio" formControlName="fulfillmentMode" value="OnRequest" />
            <span>On request</span>
          </label>
          <label class="radio-option">
            <input type="radio" formControlName="fulfillmentMode" value="OnDemand" />
            <span>On demand</span>
          </label>
        </div>
        <p class="field-hint">
          On request uses the request workflow. On demand lets crewmates record acquisitions directly.
        </p>
      </div>

      <div class="form-group">
        <label for="title">Name</label>
        <input id="title" class="form-input" type="text" formControlName="title" placeholder="Item or service name" />
      </div>

      <div class="form-group">
        <label>Categories</label>
        <app-library-category-picker
          [categories]="categories"
          [selectedIds]="selectedCategoryIds"
          (selectedIdsChange)="onCategoriesChange($event)">
        </app-library-category-picker>
      </div>

      <div class="form-group">
        <label for="description">Description and details</label>
        <textarea
          id="description"
          class="form-input textarea"
          rows="8"
          formControlName="description"
          placeholder="Describe the offering"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="valuePerUnit">Value per unit ($)</label>
          <input id="valuePerUnit" class="form-input" type="number" min="0.01" step="0.01" formControlName="valuePerUnit" />
        </div>

        <div class="form-group" *ngIf="offeringKind !== 'Service'">
          <label for="quantity">{{ quantityLabel }}</label>
          <input id="quantity" class="form-input" type="number" min="1" max="100" step="1" formControlName="quantity" />
        </div>
      </div>

      <p class="field-hint" *ngIf="offeringKind !== 'Service'">{{ quantityHint }}</p>

      <label class="checkbox-option" *ngIf="showQuantityNotApplicable">
        <input type="checkbox" formControlName="quantityNotApplicable" />
        <span>Quantity N/A (varies — whatever is available)</span>
      </label>

      <div class="form-group">
        <label for="unitLabel">Unit (optional)</label>
        <input id="unitLabel" class="form-input" type="text" formControlName="unitLabel" placeholder="e.g. chair, hour, dozen eggs" />
      </div>

      <div class="form-group">
        <label>Images (up to 5)</label>
        <app-proposal-attachment-picker
          [attachments]="attachments"
          [allowAudioRecording]="false"
          acceptTypes="image/*">
        </app-proposal-attachment-picker>
      </div>
    </form>
  </div>
</app-page-layout>
