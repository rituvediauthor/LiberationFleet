<app-page-layout
  [backButton]="backButton"
  [primaryButton]="detail && (detail.canComplete || detail.canEdit) ? primaryButton : null"
  [secondaryButton]="secondaryButton">
  <div class="request-detail-page">
    <p *ngIf="loading" class="state-text">Loading...</p>
    <p *ngIf="!loading && errorMessage" class="state-text error">{{ errorMessage }}</p>

    <ng-container *ngIf="!loading && detail">
      <div class="header-row">
        <h1 class="page-title">{{ pageTitle }}</h1>
        <span class="status-badge" [attr.data-status]="detail.status">{{ detail.status }}</span>
      </div>

      <app-library-item-card *ngIf="cardItem" [item]="cardItem" [holderLabel]="holderLabel"></app-library-item-card>

      <button
        type="button"
        class="link-btn"
        *ngIf="detail.isPossessorView && detail.openRequestCountOnUnit > 1"
        (click)="openActiveRequests()">
        View all {{ detail.openRequestCountOnUnit }} active requests for this item
      </button>

      <form [formGroup]="form" class="request-form">
        <div class="form-group">
          <label for="purpose">Purpose</label>
          <textarea
            id="purpose"
            class="form-input textarea"
            rows="5"
            formControlName="purpose"
            placeholder="Why is this item needed?"
            [attr.aria-invalid]="isInvalid('purpose')"
            [attr.aria-describedby]="isInvalid('purpose') ? 'purpose-error' : null"></textarea>
          <span id="purpose-error" class="error-text" role="alert" *ngIf="isInvalid('purpose')">Purpose is required</span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="neededByStart">Needed from</label>
            <input
              id="neededByStart"
              class="form-input"
              type="date"
              formControlName="neededByStart"
              [attr.aria-invalid]="isInvalid('neededByStart')"
              [attr.aria-describedby]="isInvalid('neededByStart') ? 'neededByStart-error' : null" />
            <span id="neededByStart-error" class="error-text" role="alert" *ngIf="isInvalid('neededByStart')">Start date is required</span>
          </div>

          <div class="form-group">
            <label for="neededByEnd">Needed until</label>
            <input
              id="neededByEnd"
              class="form-input"
              type="date"
              formControlName="neededByEnd"
              [attr.aria-invalid]="isInvalid('neededByEnd')"
              [attr.aria-describedby]="isInvalid('neededByEnd') ? 'neededByEnd-error' : null" />
            <span id="neededByEnd-error" class="error-text" role="alert" *ngIf="isInvalid('neededByEnd')">End date is required</span>
          </div>
        </div>
      </form>

      <div class="possessor-actions" *ngIf="detail.isPossessorView">
        <button type="button" class="deny-btn" *ngIf="detail.canDeny" [disabled]="isSubmitting" (click)="denyRequest()">
          Deny
        </button>
        <button type="button" class="undeny-btn" *ngIf="detail.canUndeny" [disabled]="isSubmitting" (click)="undenyRequest()">
          Restore to queue
        </button>
      </div>
    </ng-container>
  </div>
</app-page-layout>
