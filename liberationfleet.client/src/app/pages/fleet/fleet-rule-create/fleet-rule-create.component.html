<app-page-layout [backButton]="backButton" [primaryButton]="createButton">
  <div class="rule-form-page">
    <h1 class="page-title">Create Fleet Rule</h1>

    <form [formGroup]="form">
      <div class="form-group">
        <label for="title">Title</label>
        <input id="title" class="form-input" type="text" formControlName="title" placeholder="Rule title" />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          class="form-input textarea"
          rows="8"
          formControlName="description"
          placeholder="Describe the rule"></textarea>
      </div>

      <div class="form-group public-option">
        <label class="checkbox-option">
          <input type="checkbox" formControlName="isPublic" />
          Public
        </label>
        <p class="hint-text">
          Crews looking to join this fleet will see this rule and have to agree to it before they can request to join.
        </p>
      </div>
    </form>
  </div>
</app-page-layout>
