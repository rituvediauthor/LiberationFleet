<app-page-layout [backButton]="backButton" [primaryButton]="saveButton">
  <div class="form-container">
    <p *ngIf="loading" class="status-message">Loading fleet settings...</p>
    <p *ngIf="!loading && loadError" class="status-message error">{{ loadError }}</p>

    <div class="form-card" *ngIf="!loading && !loadError">
      <h1>Edit Fleet</h1>

      <form [formGroup]="form">
        <div class="form-group readonly-group">
          <label>Join code</label>
          <div class="join-code-row">
            <p class="join-code">{{ joinCode }}</p>
            <button type="button" class="copy-btn" (click)="copyJoinCode()">Copy</button>
          </div>
        </div>

        <div class="form-group">
          <label for="name">Fleet name</label>
          <input id="name" type="text" formControlName="name" class="form-input">
        </div>

        <div class="form-group">
          <label for="privacy">Fleet privacy</label>
          <select id="privacy" formControlName="privacy" class="form-input">
            <option value="Public">Public</option>
            <option value="Private">Private</option>
          </select>
        </div>

        <div class="form-group">
          <label for="scope">Fleet location type</label>
          <select id="scope" formControlName="scope" class="form-input">
            <option value="Online">Online</option>
            <option value="Local">Local</option>
          </select>
        </div>

        <ng-container *ngIf="isLocal">
          <div class="form-group">
            <label for="zipCode">Zip code</label>
            <input id="zipCode" type="text" formControlName="zipCode" class="form-input" maxlength="5" inputmode="numeric">
          </div>

          <div class="form-group">
            <label for="radiusMiles">Distance (miles)</label>
            <input id="radiusMiles" type="number" formControlName="radiusMiles" class="form-input" min="1" max="500" step="1">
          </div>
        </ng-container>

        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="requireApprovalForEdits">
            Require approval for fleet edits
          </label>
        </div>

        <section class="settings-section">
          <h2 class="section-title">Library of Things</h2>
          <div class="form-group checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" formControlName="libraryOfThingsEnabled">
              Enable Library of Things
            </label>
            <span class="hint-text">When disabled, the Library of Things button is hidden from the fleet home page.</span>
          </div>
        </section>

        <section class="settings-section">
          <h2 class="section-title">Fleet content permissions</h2>
          <div class="form-group checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" formControlName="allowCrewmateFileAttachments">
              Allow fleet members to attach files to fleet content
            </label>
            <span class="hint-text">Applies to chats, forums, comments, and library offerings.</span>
          </div>

          <ng-container *ngIf="allowCrewmateFileAttachments">
            <div class="form-group">
              <label for="minimumCrewmateTenureDaysForAttachments">Minimum tenure for attachments (days)</label>
              <input id="minimumCrewmateTenureDaysForAttachments" type="number" formControlName="minimumCrewmateTenureDaysForAttachments" class="form-input" min="0" step="1">
            </div>

            <div class="form-group">
              <label for="minimumContributionForAttachments">Minimum lifetime contribution for attachments ($)</label>
              <input id="minimumContributionForAttachments" type="number" formControlName="minimumContributionForAttachments" class="form-input" min="0" step="0.01">
            </div>
          </ng-container>

          <div class="form-group">
            <label for="minimumCrewmateTenureDaysForProposals">Minimum tenure to create proposals (days)</label>
            <input id="minimumCrewmateTenureDaysForProposals" type="number" formControlName="minimumCrewmateTenureDaysForProposals" class="form-input" min="0" step="1">
          </div>

          <div class="form-group">
            <label for="minimumContributionForProposals">Minimum lifetime contribution to create proposals ($)</label>
            <input id="minimumContributionForProposals" type="number" formControlName="minimumContributionForProposals" class="form-input" min="0" step="0.01">
          </div>
        </section>
      </form>
    </div>
  </div>
</app-page-layout>
