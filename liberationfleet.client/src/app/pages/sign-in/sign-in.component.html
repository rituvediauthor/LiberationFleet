<app-page-layout [backButton]="backButton" [primaryButton]="signInButton">
  <div class="sign-in-container">
    <div class="form-card">
      <h1>Sign In</h1>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input
            id="username"
            type="text"
            formControlName="usernameOrEmail"
            class="form-input"
            placeholder="Enter your username or email">
          <span class="error-text" *ngIf="form.get('usernameOrEmail')?.hasError('required') && form.get('usernameOrEmail')?.touched">
            Username or email is required
          </span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="form-input"
            placeholder="Enter your password">
          <span class="error-text" *ngIf="form.get('password')?.hasError('required') && form.get('password')?.touched">
            Password is required
          </span>
        </div>

        <div class="links-section">
          <a routerLink="/sign-up" class="link">Sign Up</a>
          <a routerLink="/forgot-password" class="link">Forgot Password?</a>
        </div>
      </form>
    </div>
  </div>
</app-page-layout>
