<app-page-layout [backButton]="backButton" [primaryButton]="signInButton">
  <div class="sign-in-container">
    <div class="form-card">
      <h1>Sign In</h1>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input
            id="username"
            type="text"
            formControlName="usernameOrEmail"
            class="form-input"
            autocomplete="username"
            placeholder="Enter your username or email"
            [attr.aria-invalid]="isInvalid('usernameOrEmail')"
            [attr.aria-describedby]="isInvalid('usernameOrEmail') ? 'username-error' : null">
          <span
            id="username-error"
            class="error-text"
            role="alert"
            *ngIf="isInvalid('usernameOrEmail') && form.get('usernameOrEmail')?.hasError('required')">
            Username or email is required
          </span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="form-input"
            autocomplete="current-password"
            placeholder="Enter your password"
            [attr.aria-invalid]="isInvalid('password')"
            [attr.aria-describedby]="isInvalid('password') ? 'password-error' : null">
          <span
            id="password-error"
            class="error-text"
            role="alert"
            *ngIf="isInvalid('password') && form.get('password')?.hasError('required')">
            Password is required
          </span>
        </div>

        <div class="links-section">
          <a routerLink="/sign-up" class="link">Sign Up</a>
          <a routerLink="/forgot-password" class="link">Forgot Password?</a>
        </div>

        <p class="recovery-note" id="sign-in-recovery-note">
          After signing in, you will be prompted for your 12-word recovery key to decrypt crew content.
          This is separate from your login password.
        </p>
      </form>
    </div>
  </div>
</app-page-layout>
