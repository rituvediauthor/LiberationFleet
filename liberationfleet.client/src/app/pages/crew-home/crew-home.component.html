<app-nav-layout activeTab="crew">

  <div class="crew-home">

    <app-hub-loading *ngIf="loading" variant="crew" label="Loading crew..."></app-hub-loading>

    <ng-container *ngIf="!loading && membership?.hasCrew; else noCrew">

      <div class="crew-dashboard">
        <h1 class="sr-only">{{ membership?.crewName || 'Crew' }}</h1>

        <div class="aid-widget-slot">          <app-donation-campaign-widget
            variant="crew"
            [enabled]="!!membership?.hasCrew">
          </app-donation-campaign-widget>

          <div class="info-widget" *ngIf="seasonStarted">
            <span class="info-label">Next aid</span>
            <p class="info-text">{{ nextAidHeadline }}</p>
            <p class="info-platform" *ngIf="nextAidPlatformLine">{{ nextAidPlatformLine }}</p>
          </div>
        </div>



        <nav class="crew-menu" aria-label="Crew actions">

          <button type="button" class="menu-link crew-name-link" (click)="goToEditCrew()">

            <span class="menu-icon-wrap">

              <app-brand-logo
                class="menu-brand-logo"
                variant="crew"
                size="sm"
                alt=""
                [customSrc]="crewImageSrc">
              </app-brand-logo>
              <app-content-badge [count]="areaCounts.settings"></app-content-badge>

            </span>

            <span class="menu-label">{{ membership?.crewName }}</span>

            <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>

          </button>

  

          <button type="button" class="menu-link" (click)="goToRules()">

              <span class="menu-icon-wrap">
              <i class="fa-solid fa-book menu-icon" aria-hidden="true"></i>
              <app-content-badge [count]="areaCounts.rules"></app-content-badge>
            </span>

            <span class="menu-label">Rules</span>

            <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>

          </button>



          <button type="button" class="menu-link" (click)="goToGiftLog()">

            <span class="menu-icon-wrap">

              <i class="fa-solid fa-gift menu-icon" aria-hidden="true"></i>

              <app-content-badge [count]="areaCounts.giftLog"></app-content-badge>

            </span>

            <span class="menu-label">Giving Season</span>

            <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>

          </button>



          <button type="button" class="menu-link" (click)="goToEmergencyRequests()">

            <span class="menu-icon-wrap">

              <i class="fa-solid fa-triangle-exclamation menu-icon" aria-hidden="true"></i>

            </span>

            <span class="menu-label">Emergency Requests</span>

            <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>

          </button>



          <button type="button" class="menu-link" *ngIf="libraryOfThingsEnabled" (click)="goToLibraryOfThings()">

            <span class="menu-icon-wrap">

              <i class="fa-solid fa-boxes-stacked menu-icon" aria-hidden="true"></i>

              <app-content-badge [count]="areaCounts.library"></app-content-badge>

            </span>

            <span class="menu-label">Library of Things</span>

            <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>

          </button>



          <button type="button" class="menu-link" [routerLink]="['/app/crew/chats']">

            <span class="menu-icon-wrap">

              <i class="fa-solid fa-comments menu-icon" aria-hidden="true"></i>

              <app-content-badge [count]="areaCounts.chats"></app-content-badge>

            </span>

            <span class="menu-label">Chats</span>

            <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>

          </button>



          <button type="button" class="menu-link" (click)="goToForums()">

            <span class="menu-icon-wrap">

              <i class="fa-solid fa-rectangle-list menu-icon" aria-hidden="true"></i>

              <app-content-badge [count]="areaCounts.forums"></app-content-badge>

            </span>

            <span class="menu-label">Forums</span>

            <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>

          </button>



          <button type="button" class="menu-link" (click)="goToProposals()">

            <span class="menu-icon-wrap">

              <i class="fa-solid fa-list-check menu-icon" aria-hidden="true"></i>

              <app-content-badge [count]="areaCounts.proposals"></app-content-badge>

            </span>

            <span class="menu-label">Proposals</span>

            <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>

          </button>



          <button type="button" class="menu-link" (click)="goToCrewmates()">

            <span class="menu-icon-wrap">

              <i class="fa-solid fa-users menu-icon" aria-hidden="true"></i>

              <app-content-badge [count]="areaCounts.crewmates"></app-content-badge>

            </span>

            <span class="menu-label">Crewmates</span>

            <i class="fa-solid fa-angle-right menu-chevron" aria-hidden="true"></i>

          </button>

        </nav>

      </div>

    </ng-container>



    <ng-template #noCrew>

      <ng-container *ngIf="!loading">

      <div class="hero">

        <h1>Welcome to LiberationFleet</h1>

        <p class="subtitle">You're not in a crew yet. Create one or join an existing crew to get started.</p>

      </div>

      <div class="actions">

        <button type="button" class="action-btn primary" (click)="goToCreateCrew()">Create Crew</button>

        <button type="button" class="action-btn secondary" (click)="goToJoinCrew()">Join Crew</button>

        <button type="button" class="action-btn secondary" (click)="goToJoinRequests()">My Join Requests</button>

      </div>

      </ng-container>

    </ng-template>

  </div>

</app-nav-layout>
