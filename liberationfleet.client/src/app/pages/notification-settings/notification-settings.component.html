<app-page-layout [backButton]="backButton" [primaryButton]="saveButton">
  <div class="notification-settings-page">
    <h1>Notifications</h1>
    <p class="intro">Choose which notifications you want to receive.</p>

    <p *ngIf="loading" class="state-text">Loading preferences...</p>
    <p *ngIf="!loading && errorMessage" class="state-text error">{{ errorMessage }}</p>

    <ng-container *ngIf="!loading && preferences.length > 0">
      <section class="preference-section" *ngIf="crewPreferences.length > 0">
        <h2>Crew notifications</h2>
        <div class="preference-list">
          <label class="preference-row" *ngFor="let preference of crewPreferences">
            <input
              type="checkbox"
              [checked]="preference.isEnabled"
              (change)="togglePreference(preference)">
            <span>{{ preference.label }}</span>
          </label>
        </div>
      </section>

      <section class="preference-section" *ngIf="fleetPreferences.length > 0">
        <h2>Fleet notifications</h2>
        <div class="preference-list">
          <label class="preference-row" *ngFor="let preference of fleetPreferences">
            <input
              type="checkbox"
              [checked]="preference.isEnabled"
              (change)="togglePreference(preference)">
            <span>{{ preference.label }}</span>
          </label>
        </div>
      </section>
    </ng-container>
  </div>
</app-page-layout>

<app-settings-password-dialog
  [visible]="showPasswordDialog"
  [errorMessage]="passwordDialogError"
  [verifying]="passwordDialogVerifying"
  (confirmed)="onPasswordDialogConfirmed($event)"
  (dismissed)="onPasswordDialogDismissed()">
</app-settings-password-dialog>
