services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: liberationfleet-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in a .env file}
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - liberationfleet-sqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: LiberationFleet.Server/Dockerfile
    container_name: liberationfleet-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=db;Database=LiberationFleetDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False
      Jwt__SecretKey: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in a .env file}
      Jwt__Issuer: LiberationFleet
      Jwt__Audience: LiberationFleetClient
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  liberationfleet-sqldata:
