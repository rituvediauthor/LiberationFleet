# Database only — use with local `dotnet run` + `npm start`
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: liberationfleet-db-dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in a .env file}
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - liberationfleet-sqldata-dev:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: liberationfleet-livekit-dev
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./infrastructure/livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: liberationfleet-coturn-dev
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --lt-cred-mech
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --realm=liberationfleet.local
      - --user=livekit:livekitturn
      - --listening-port=3478
    restart: unless-stopped

volumes:
  liberationfleet-sqldata-dev:
