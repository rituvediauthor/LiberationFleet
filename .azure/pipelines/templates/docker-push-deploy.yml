parameters:
  - name: azureSubscription
    type: string
  - name: acrName
    type: string
  - name: acrLoginServer
    type: string
  - name: imageRepository
    type: string
  - name: imageTag
    type: string
  - name: resourceGroup
    type: string
  - name: webAppName
    type: string
  - name: dockerfilePath
    type: string

steps:
  - task: AzureCLI@2
    displayName: Build, push, and deploy container
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        IMAGE="${{ parameters.acrLoginServer }}/${{ parameters.imageRepository }}:${{ parameters.imageTag }}"
        IMAGE_LATEST="${{ parameters.acrLoginServer }}/${{ parameters.imageRepository }}:latest"

        az acr login --name "${{ parameters.acrName }}"

        docker build \
          --pull \
          -t "${IMAGE}" \
          -t "${IMAGE_LATEST}" \
          -f "${{ parameters.dockerfilePath }}" \
          "$(Build.SourcesDirectory)"

        docker push "${IMAGE}"
        docker push "${IMAGE_LATEST}"

        az webapp config container set \
          --name "${{ parameters.webAppName }}" \
          --resource-group "${{ parameters.resourceGroup }}" \
          --docker-custom-image-name "${IMAGE}" \
          --docker-registry-server-url "https://${{ parameters.acrLoginServer }}"

        az webapp restart \
          --name "${{ parameters.webAppName }}" \
          --resource-group "${{ parameters.resourceGroup }}"

        echo "Deployed ${IMAGE} to ${{ parameters.webAppName }}"
