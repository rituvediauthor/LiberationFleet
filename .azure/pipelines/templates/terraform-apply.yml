parameters:
  - name: environmentName
    type: string
  - name: azureSubscription
    type: string
  - name: terraformWorkingDirectory
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainer
    type: string
  - name: backendKey
    type: string
  - name: terraformVersion
    type: string
    default: "1.9.8"
  - name: apply
    type: boolean
    default: true

steps:
  - bash: |
      set -euo pipefail
      curl -fsSL "https://releases.hashicorp.com/terraform/${{ parameters.terraformVersion }}/terraform_${{ parameters.terraformVersion }}_linux_amd64.zip" -o /tmp/terraform.zip
      sudo unzip -o /tmp/terraform.zip -d /usr/local/bin
      terraform version
    displayName: Install Terraform ${{ parameters.terraformVersion }}

  - task: AzureCLI@2
    displayName: Terraform init / plan (${{ parameters.environmentName }})
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: ${{ parameters.terraformWorkingDirectory }}
      inlineScript: |
        set -euo pipefail

        terraform init \
          -input=false \
          -backend-config="resource_group_name=${{ parameters.backendResourceGroup }}" \
          -backend-config="storage_account_name=${{ parameters.backendStorageAccount }}" \
          -backend-config="container_name=${{ parameters.backendContainer }}" \
          -backend-config="key=${{ parameters.backendKey }}"

        terraform validate

        terraform plan \
          -input=false \
          -var-file="environments/${{ parameters.environmentName }}.tfvars" \
          -out="tfplan-${{ parameters.environmentName }}"

  - ${{ if parameters.apply }}:
    - task: AzureCLI@2
      displayName: Terraform apply (${{ parameters.environmentName }})
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: ${{ parameters.terraformWorkingDirectory }}
        inlineScript: |
          set -euo pipefail
          terraform apply \
            -input=false \
            -auto-approve \
            "tfplan-${{ parameters.environmentName }}"
