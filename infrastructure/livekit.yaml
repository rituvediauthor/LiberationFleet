# LiveKit SFU config for local docker-compose.dev.yml
# Keys must match LiberationFleet.Server appsettings LiveKit:ApiKey / ApiSecret

port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false
  # Coturn runs with network_mode: host in docker-compose.dev.yml
  stun_servers:
    - stun:stun.l.google.com:19302
  turn_servers:
    - host: host.docker.internal
      port: 3478
      protocol: udp
      username: livekit
      credential: livekitturn
    - host: host.docker.internal
      port: 3478
      protocol: tcp
      username: livekit
      credential: livekitturn
keys:
  # Format: <api_key>: <api_secret>
  # Keep in sync with appsettings.json LiveKit section
  devkey: secretsecretsecretsecretsecretsecret12
logging:
  level: info
